<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中小学AI学习助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }

        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .subject-card {
            cursor: pointer; border-radius: 20px; padding: 24px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            transition: all .3s ease; border: 3px solid transparent;
        }
        .subject-card:hover { transform: scale(1.05); border-color: rgba(255,255,255,.5); }
        .subject-card.selected { border-color: white; box-shadow: 0 0 30px rgba(255,255,255,.4); }

        .grade-btn {
            width: 90px; height: 90px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: .95rem; font-weight: 700; cursor: pointer;
            transition: all .3s ease; border: 3px solid rgba(255,255,255,.3);
            text-align: center; line-height: 1.2;
        }
        .grade-btn:hover { transform: scale(1.08); background: rgba(255,255,255,.4) !important; border-color: white; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .page { display: none; }
        .page.active { display: block; }

        /* 学科主题色 */
        .theme-chinese  { background: linear-gradient(135deg, #ff9a56, #ff6b6b); }
        .theme-math     { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .theme-english  { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .theme-physics  { background: linear-gradient(135deg, #667eea, #764ba2); }
        .theme-chemistry{ background: linear-gradient(135deg, #f093fb, #f5576c); }
        .theme-biology  { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .theme-history  { background: linear-gradient(135deg, #fa709a, #fee140); }
        .theme-geography{ background: linear-gradient(135deg, #30cfd0, #330867); }
        .theme-moral    { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .theme-science  { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .theme-music    { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .theme-art      { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .theme-pe       { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
        .theme-it       { background: linear-gradient(135deg, #6a11cb, #2575fc); }

        /* 聊天窗口 */
        #chat-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #chat-overlay.active { display: flex; }

        .chat-window {
            width: 100%;
            max-width: 480px;
            height: 80vh;
            max-height: 680px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-body {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
        }

        /* 消息区域 */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-bubble.user {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .msg-bubble.ai {
            align-self: flex-start;
            background: white;
            color: #333;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
        .msg-bubble.ai.typing::after {
            content: '▋';
            animation: blink .7s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: white;
            flex-shrink: 0;
        }
        .chat-input-area textarea {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.5;
        }
        .chat-input-area textarea:focus { border-color: #667eea; }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .2s;
        }
        .send-btn:hover { background: #5a6fd6; }
        .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }

        @media(max-width:640px){
            .subject-card{padding:14px}
            .grade-btn{width:75px;height:75px;font-size:.85rem}
            .chat-window { max-height: 100%; height: 100%; border-radius: 0; max-width: 100%; }
            #chat-overlay { padding: 0; }
        }
    </style>
</head>

    english:   { name: '星语探险家',   subject: '英语',      theme: 'theme-english',   color: 'linear-gradient(135deg,#43e97b,#38f9d7)',  greeting: 'Hi！我是星语探险家，陪你用单词当船票，用句子做地图，一起探索英语世界的奇妙角落！' },
    physics:   { name: '光影探索官',   subject: '物理',      theme: 'theme-physics',   color: 'linear-gradient(135deg,#667eea,#764ba2)',  greeting: '叮！科学实验室已开启！我是光影探索官，带你揭开力与光的秘密，发现物理世界里藏不住的惊喜～' },
    chemistry: { name: '奇妙炼金师',   subject: '化学',      theme: 'theme-chemistry', color: 'linear-gradient(135deg,#f093fb,#f5576c)',  greeting: '欢迎来到魔法药水屋！我是奇妙炼金师，陪你观察颜色的变化、发现元素的奇妙，解锁化学世界的神奇反应！' },
    biology:   { name: '生命小侦探',   subject: '生物',      theme: 'theme-biology',   color: 'linear-gradient(135deg,#43e97b,#38f9d7)',  greeting: '你好呀！我是生命小侦探，带你认识花草虫鱼，探索细胞的奥秘，读懂大自然写的每一封信～' },
    history:   { name: '时光说书人',   subject: '历史',      theme: 'theme-history',   color: 'linear-gradient(135deg,#fa709a,#fee140)',  greeting: '3、2、1，穿越启动！我是时光说书人，陪你走进朝代更迭，听历史讲那些藏在时光里的故事！' },
    geography: { name: '山河小向导',   subject: '地理',      theme: 'theme-geography', color: 'linear-gradient(135deg,#30cfd0,#667eea)',  greeting: '准备好出发了吗？我是山河小向导，带你翻越山川、横跨大洋，认识地球的每一处奇妙风景！' },
    moral:     { name: '成长守护官',   subject: '道德与法治', theme: 'theme-moral',    color: 'linear-gradient(135deg,#a8edea,#fed6e3)',  greeting: '我是成长守护官，陪你学习规则与善意，解锁勇气与责任，做正直又温暖的小小少年！' },
    science:   { name: '创想领航员',   subject: '科学',      theme: 'theme-science',   color: 'linear-gradient(135deg,#ffecd2,#fcb69f)',  greeting: '欢迎来到未来科学站！我是创想领航员，带你大胆提问、动手探索，把奇思妙想变成科学的答案！' },
    music:     { name: '旋律小精灵',   subject: '音乐',      theme: 'theme-music',     color: 'linear-gradient(135deg,#ffecd2,#fcb69f)',  greeting: '叮咚～音符已上线！我是旋律小精灵，陪你认识节奏与音阶，一起在音乐里遇见快乐～' },
    art:       { name: '色彩魔法师',   subject: '美术',      theme: 'theme-art',       color: 'linear-gradient(135deg,#a18cd1,#fbc2eb)',  greeting: '欢迎来到彩虹画室！我是色彩魔法师，陪你用画笔描绘想象，让每一抹颜色都开出花来～' },
    pe:        { name: '活力小健将',   subject: '体育',      theme: 'theme-pe',        color: 'linear-gradient(135deg,#84fab0,#8fd3f4)',  greeting: '动起来！我是活力小健将，陪你解锁运动的乐趣，一起跑出健康、跳出自信！' },
    it:        { name: '代码探险家',   subject: '信息科技',  theme: 'theme-it',        color: 'linear-gradient(135deg,#6a11cb,#2575fc)',  greeting: '欢迎进入数字宇宙！我是代码探险家，带你认识编程的语言，探索科技世界的无限可能！' }
};

const GRADES = ['','一年级','二年级','三年级','四年级','五年级','六年级','七年级','八年级','九年级'];

// ========== 状态 ==========
let state = { subject: null, grade: null };
let isSending = false;
let conversationId = null;

// ========== 页面切换 ==========
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ========== 学科选择 ==========
document.querySelectorAll('.subject-card').forEach(card => {
    card.addEventListener('click', () => {
        state.subject = card.dataset.key;
        const cfg = SUBJECTS[state.subject];
        document.getElementById('grade-bg').className = 'min-h-screen p-4 md:p-8 ' + cfg.theme;
        document.getElementById('grade-title').textContent = cfg.name + ' · 选择年级';
        showPage('page-grade');
    });
});

// ========== 年级选择 ==========
document.querySelectorAll('.grade-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        state.grade = parseInt(btn.dataset.g);
        openChat();
    });
});

// ========== 返回学科 ==========
function goSubject() {
    state.subject = null;
    state.grade = null;
    conversationId = null;
    showPage('page-subject');
}

// ========== 打开聊天 ==========
function openChat() {
    const cfg = SUBJECTS[state.subject];
    const gradeName = GRADES[state.grade];

    document.getElementById('chat-title').textContent = cfg.name + ' AI老师';
    document.getElementById('chat-subtitle').textContent = gradeName + ' · 有问题尽管问我！';
    document.getElementById('chat-header').style.background = cfg.color;

    // 清空消息，重置对话
    const messagesEl = document.getElementById('messages');
    messagesEl.innerHTML = '';
    conversationId = null;

    // 显示开场白
    addMessage('ai', cfg.greeting || `你好！我是你的${cfg.name} AI老师 🎉\n专为${gradeName}同学服务，有任何问题随时问我！`);

    document.getElementById('chat-overlay').classList.add('active');
    setTimeout(() => document.getElementById('chat-input').focus(), 300);
}

function closeChat() {
    document.getElementById('chat-overlay').classList.remove('active');
}

// ========== 添加消息气泡 ==========
function addMessage(role, text) {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg-bubble ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
}

// ========== 发送消息 ==========
async function sendMessage() {
    if (isSending) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isSending = true;
    document.getElementById('send-btn').disabled = true;

    addMessage('user', text);

    // 创建AI回复气泡（流式）
    const aiDiv = addMessage('ai', '');
    aiDiv.classList.add('typing');

    const cfg = SUBJECTS[state.subject];

    // 温和引导：告诉AI角色定位，只在明显跑题时提示
    const constrainedMessage = `[角色设定：你是专门辅导${cfg.subject}的老师，学生是${GRADES[state.grade]}。请用适合${GRADES[state.grade]}学生的语言来回答，尽量结合${cfg.subject}的知识来解答。如果学生的问题完全与${cfg.subject}无关，可以友好地提示他去对应的学科提问。]

${text}`;

    try {
        const body = {
            subject: cfg.subject,
            grade: state.grade,
            message: constrainedMessage
        };

        const resp = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (!resp.ok) throw new Error('服务器错误 ' + resp.status);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let currentEvent = '';
        aiDiv.classList.remove('typing');

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            for (const line of lines) {
                // 记录当前 event 类型
                if (line.startsWith('event:')) {
                    currentEvent = line.slice(6).trim();
                    continue;
                }
                if (!line.startsWith('data:')) continue;
                const raw = line.slice(5).trim();
                if (!raw || raw === '[DONE]') continue;
                try {
                    const data = JSON.parse(raw);
                    // 兼容两种格式：
                    // 1. 扣子v3/chat SSE：event=conversation.message.delta，type=answer，content为增量文本
                    // 2. 旧版/其他格式：直接 data.type === 'answer'
                    const isDelta = currentEvent === 'conversation.message.delta';
                    const isAnswer = data.type === 'answer';
                    if (isAnswer && (isDelta || !currentEvent)) {
                        // content 可能为空字符串（思考阶段），只在有实际内容时追加
                        if (typeof data.content === 'string' && data.content !== '') {
                            fullText += data.content;
                            aiDiv.textContent = fullText;
                            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                        }
                    }
                } catch(e) {}
            }
        }

        if (!fullText) {
            aiDiv.textContent = '抱歉，我没有收到回复，请稍后重试。';
        }

    } catch(e) {
        aiDiv.classList.remove('typing');
        aiDiv.textContent = '⚠️ 连接失败：' + e.message;
    }

    isSending = false;
    document.getElementById('send-btn').disabled = false;
}

// ========== 快捷键 ==========
function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ========== 初始化 ==========
window.addEventListener('load', () => {
    showPage('page-subject');
});
</script>
